spring.application.name=moneymanagement

# Mysql configuration
spring.datasource.url=jdbc:mysql://localhost:3306/money_management
spring.datasource.username=root
spring.datasource.password=

server.servlet.context-path=/api/v1

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Email configuration
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${USERNAME_EMAIL}
spring.mail.password=${PASSWORD_EMAIL}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${FROM_EMAIL}