spring.application.name=moneymanagement

# Security
app.jwt.secret=${SECRET_KEY}
app.jwt.access-token-expiration=1800000
app.jwt.refresh-token-expiration=604800000

spring.application.group=${SECRET_KEY}

# Mysql configuration
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#server.servlet.context-path=/api/v1

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Email configuration
spring.mail.host=${HOST}
spring.mail.port=587
spring.mail.username=${USERNAME_EMAIL}
spring.mail.password=${PASSWORD_EMAIL}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${FROM_EMAIL}